name: AI News Trend Pipeline

on:
  schedule:
    - cron: '*/5 * * * *'  # Otomatis jalan setiap 5 menit (untuk uji coba)
  workflow_dispatch:      # Tombol manual

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        cd ai-news-dashboard && pip install -r requirements.txt

    - name: Run Pipeline Script
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        cd ai-news-dashboard && python src/main_pipeline.py
